apiVersion: "nais.io/v1alpha1"
kind: "Application"
metadata:
  name: tiltaksgjennomforing-api
  namespace: arbeidsgiver
  labels:
    team: arbeidsgiver
spec:
  env:
    - name: MILJO
      value: dev-fss
    - name: JDK_JAVA_OPTIONS
      value: "-XX:MaxRAMPercentage=80.0"
  azure:
    application:
      enabled: true
      allowAllUsers: true
      tenant: trygdeetaten.no
      claims:
        groups:
          # Beslutter-gruppe
          - id: fbfea82d-13da-43ad-a2f2-d7f21cb95f12
          # Fortrolig adresse gruppe
          - id: 2e1dc582-f762-4510-a660-88bf68fb7128
          # Strengt fortrolig adresse gruppe
          - id: a1b518e2-3947-478d-8929-e5d685c47cac
        extra:
          - "NAVident"
  kafka:
    pool: nav-dev
  image: {{image}}
  port: 8080
  liveness:
    path: /tiltaksgjennomforing-api/internal/healthcheck
    initialDelay: 30
    timeout: 1
    periodSeconds: 30
    failureThreshold: 10
  readiness:
    path: /tiltaksgjennomforing-api/internal/healthcheck
    initialDelay: 30
    timeout: 1
    periodSeconds: 30
    failureThreshold: 10
  resources:
    limits:
      cpu: 2000m
      memory: 3000Mi
    requests:
      cpu: 500m
      memory: 600Mi
  ingresses:
    - https://arbeidsgiver.nais.preprod.local/tiltaksgjennomforing-api/
  vault:
    enabled: true
  webproxy: true
  strategy:
    type: RollingUpdate
  tokenx:
    enabled: true
  prometheus:
    enabled: true
    path: /tiltaksgjennomforing-api/internal/actuator/prometheus
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
    logging:
      destinations:
        - id: elastic
        - id: team_logs
        - id: loki
  accessPolicy:
    inbound:
      rules:
        - application: tiltak-proxy
        - application: min-side-arbeidsgiver
          namespace: fager
          cluster: dev-gcp
    outbound:
      rules:
        - application: poao-tilgang
          namespace: poao
        - application: pdl-api
          namespace: pdl
      external:
        - host: team-tiltak-unleash-api.nav.cloud.nais.io
        - host: arbeidsgiver-altinn-tilganger.intern.dev.nav.no
  envFrom:
    - secret: tiltaksgjennomforing-api
    - secret: tiltaksgjennomforing-api-unleash-api-token
